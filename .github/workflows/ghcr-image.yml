name: GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: false
        default: "main"
        type: string
      image_tag:
        description: "Extra image tag to publish"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}"
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:main"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${{ github.event.inputs.image_tag }}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "value<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
